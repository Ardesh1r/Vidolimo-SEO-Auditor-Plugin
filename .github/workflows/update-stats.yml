name: Update Repository Stats

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get GitHub Insights Data
        id: stats
        run: |
          # Get repository stats using GitHub API
          REPO_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Ardesh1r/Vidolimo-SEO-Auditor-Plugin)
          
          STARS=$(echo $REPO_DATA | jq '.stargazers_count')
          FORKS=$(echo $REPO_DATA | jq '.forks_count')
          WATCHERS=$(echo $REPO_DATA | jq '.watchers_count')
          
          echo "stars=$STARS" >> $GITHUB_OUTPUT
          echo "forks=$FORKS" >> $GITHUB_OUTPUT
          echo "watchers=$WATCHERS" >> $GITHUB_OUTPUT
          
          # Get GitHub Insights: Clones (last 14 days)
          CLONES_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Ardesh1r/Vidolimo-SEO-Auditor-Plugin/traffic/clones)
          
          TOTAL_CLONES=$(echo $CLONES_DATA | jq '[.clones[].count] | add // 0')
          UNIQUE_CLONERS=$(echo $CLONES_DATA | jq '[.clones[].uniques] | add // 0')
          
          echo "total_clones=$TOTAL_CLONES" >> $GITHUB_OUTPUT
          echo "unique_cloners=$UNIQUE_CLONERS" >> $GITHUB_OUTPUT
          
          # Get GitHub Insights: Views (last 14 days)
          VIEWS_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Ardesh1r/Vidolimo-SEO-Auditor-Plugin/traffic/views)
          
          TOTAL_VIEWS=$(echo $VIEWS_DATA | jq '[.views[].count] | add // 0')
          UNIQUE_VISITORS=$(echo $VIEWS_DATA | jq '[.views[].uniques] | add // 0')
          
          echo "total_views=$TOTAL_VIEWS" >> $GITHUB_OUTPUT
          echo "unique_visitors=$UNIQUE_VISITORS" >> $GITHUB_OUTPUT
          
          # Get WordPress.org plugin stats
          WP_DATA=$(curl -s https://api.wordpress.org/plugins/info/1.0/vidolimo-seo-auditor.json)
          
          WP_DOWNLOADS=$(echo $WP_DATA | jq '.downloaded')
          WP_INSTALLS=$(echo $WP_DATA | jq '.active_installations')
          WP_RATING=$(echo $WP_DATA | jq '.rating')
          WP_RATINGS=$(echo $WP_DATA | jq '.num_ratings')
          
          echo "wp_downloads=$WP_DOWNLOADS" >> $GITHUB_OUTPUT
          echo "wp_installs=$WP_INSTALLS" >> $GITHUB_OUTPUT
          echo "wp_rating=$WP_RATING" >> $GITHUB_OUTPUT
          echo "wp_ratings=$WP_RATINGS" >> $GITHUB_OUTPUT

      - name: Create Stats File
        run: |
          cat > STATS.md << 'EOF'
          # Repository Statistics
          
          Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ## GitHub Stats (Overall)
          - ⭐ Stars: ${{ steps.stats.outputs.stars }}
          - 🍴 Forks: ${{ steps.stats.outputs.forks }}
          - 👁️ Watchers: ${{ steps.stats.outputs.watchers }}
          
          ## GitHub Insights (Last 14 Days)
          - 📥 Clones: ${{ steps.stats.outputs.total_clones }}
          - 👤 Unique Cloners: ${{ steps.stats.outputs.unique_cloners }}
          - 👀 Total Views: ${{ steps.stats.outputs.total_views }}
          - 👥 Unique Visitors: ${{ steps.stats.outputs.unique_visitors }}
          
          ## WordPress.org Stats
          - 📥 Total Downloads: ${{ steps.stats.outputs.wp_downloads }}
          - 🚀 Active Installs: ${{ steps.stats.outputs.wp_installs }}
          - ⭐ Rating: ${{ steps.stats.outputs.wp_rating }}/100
          - 📊 Number of Ratings: ${{ steps.stats.outputs.wp_ratings }}
          EOF

      - name: Update README with Stats
        run: |
          # Note: README already has dynamic badges via shields.io
          # This step is optional - we keep STATS.md as the source of truth
          echo "Stats have been updated in STATS.md"

      - name: Commit and Push Stats
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add STATS.md
          git commit -m "📊 Update repository statistics" || echo "No changes to commit"
          git push || echo "Nothing to push"
