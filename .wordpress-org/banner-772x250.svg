<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="772" height="250" fill="url(#bgGradient)"/>
  
  <!-- Accent shape -->
  <circle cx="700" cy="50" r="75" fill="#00d4ff" opacity="0.1"/>
  <circle cx="100" cy="225" r="60" fill="#00d4ff" opacity="0.1"/>
  
  <!-- Logo area -->
  <g transform="translate(50, 75)">
    <rect width="100" height="100" rx="10" fill="#00d4ff" opacity="0.1"/>
    <text x="50" y="65" font-size="40" font-weight="bold" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif">V</text>
  </g>
  
  <!-- Main text -->
  <text x="190" y="70" font-size="32" font-weight="bold" fill="#ffffff" font-family="Arial, sans-serif">Vidolimo SEO</text>
  <text x="190" y="110" font-size="32" font-weight="bold" fill="#ffffff" font-family="Arial, sans-serif">Auditor</text>
  
  <!-- Subtitle -->
  <text x="190" y="145" font-size="14" fill="#00d4ff" font-family="Arial, sans-serif">WordPress SEO Analysis Tool</text>
  
  <!-- Features -->
  <text x="190" y="175" font-size="12" fill="#cccccc" font-family="Arial, sans-serif">✓ Content Analysis  ✓ Technical SEO  ✓ Performance</text>
</svg>
